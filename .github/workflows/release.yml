name: Release

on:
  push:
    tags:
      - 'v[0-9]*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Build & Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euxo pipefail
          sudo apt-get update
          # Full Tauri 2 prereqs (https://v2.tauri.app/start/prerequisites/#linux).
          # `libglib2.0-dev` + `libsoup-3.0-dev` are required by glib-sys / soup3-sys
          # on Ubuntu 22.04 — libwebkit2gtk-4.1-dev no longer pulls them transitively
          # in current GHA runner images. `libayatana-appindicator3-dev` is the
          # supported replacement for the deprecated `libappindicator3-dev`.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            patchelf
          # Diagnostic — if these fail the build will fail with a clear error
          # before tauri-action runs cargo, instead of a cryptic glib-sys panic.
          echo "=== pkg-config search paths ==="
          pkg-config --variable=pc_path pkg-config
          echo "=== probe glib stack ==="
          for pkg in glib-2.0 gobject-2.0 gio-2.0 cairo gdk-pixbuf-2.0 pango \
                    gtk+-3.0 webkit2gtk-4.1 javascriptcoregtk-4.1 \
                    libsoup-3.0 ayatana-appindicator3-0.1 librsvg-2.0; do
            if version=$(pkg-config --modversion "$pkg" 2>/dev/null); then
              printf '  ✓ %-32s %s\n' "$pkg" "$version"
            else
              printf '  ✗ %-32s MISSING\n' "$pkg"
              missing=1
            fi
          done
          if [ "${missing:-0}" = "1" ]; then
            echo "::error::One or more Tauri Linux prereqs are missing — fix the apt-get install list above"
            exit 1
          fi
          # Belt + braces: also export PKG_CONFIG_PATH at the runner level so
          # every subsequent step (including tauri-action's internal cargo
          # subprocess) inherits it, not just the step's `env:` block.
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:/usr/lib/pkgconfig" >> "$GITHUB_ENV"

      - run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @gitwand/core run build

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/gitwand-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Import certificate
          echo -n "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12 2>/dev/null || \
          echo -n "$APPLE_CERTIFICATE" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Build release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Force pkg-config to look in the standard Ubuntu multi-arch path.
          # On the current GHA ubuntu-22.04 runner image, apt-get install leaves
          # `glib-2.0.pc` in /usr/lib/x86_64-linux-gnu/pkgconfig but cargo's
          # build script (glib-sys / gio-sys / soup3-sys) reports the path as
          # not set, suggesting tauri-action runs cargo in a context where the
          # default pkg-config search path is reset. Pin it here explicitly so
          # the resolution is independent of runner image quirks.
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:/usr/lib/pkgconfig
          # macOS code signing & notarization
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: GitWand ${{ github.ref_name }}
          releaseBody: |
            ## GitWand ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon + Intel) | `.dmg` |
            | Linux | `.deb` · `.AppImage` |
            | Windows | `.msi` · `.exe` |

            See the [changelog](https://github.com/devlint/GitWand/commits/${{ github.ref_name }}) for details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: true

      # GitHub Releases API occasionally returns 500 on asset uploads,
      # especially when the matrix jobs upload in parallel. Re-upload any
      # asset that is missing from the release (idempotent, safe to retry).
      - name: Verify & re-upload missing assets
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Collect assets already on the release
          uploaded=$(gh release view "$TAG" --repo "$REPO" --json assets \
            --jq '[.assets[].name]' 2>/dev/null || echo '[]')

          # Find all built artifacts for this platform
          artifact_dir="apps/desktop/target/release/bundle"
          [ -d "$artifact_dir" ] || exit 0

          # Walk every signable artifact (installers + .sig files)
          find "$artifact_dir" \
            \( -name "*.deb" -o -name "*.AppImage" \
            -o -name "*.rpm" \
            -o -name "*.msi" -o -name "*.exe" -o -name "*.nsis" \
            -o -name "*.dmg" \
            -o -name "*.sig" \) \
            -type f | while read -r file; do
              name="$(basename "$file")"
              if echo "$uploaded" | grep -qF "\"$name\""; then
                echo "✓ already uploaded: $name"
              else
                echo "⚠ missing from release, uploading: $name"
                for attempt in 1 2 3; do
                  gh release upload "$TAG" "$file" --repo "$REPO" --clobber && break
                  echo "  attempt $attempt failed, retrying in 10s…"
                  sleep 10
                done
              fi
          done

  # After all platform builds succeed, generate update.json and publish to GitHub Pages
  publish-update-manifest:
    name: Publish update manifest
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Download update manifest from release (contains real signatures)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p website/public/update
          # Retry up to 3 times — the release matrix may have signaled success
          # before tauri-action finalized the merged latest.json on the release.
          for attempt in 1 2 3; do
            if gh release download ${{ github.ref_name }} \
                --pattern "latest.json" \
                --output update.json \
                --repo ${{ github.repository }} 2>&1; then
              break
            fi
            echo "::warning::latest.json not yet available on release ${{ github.ref_name }} (attempt $attempt/3) — sleeping 15s"
            sleep 15
          done
          [ -s update.json ] || { echo "::error::latest.json missing or empty on release ${{ github.ref_name }} after retries"; exit 1; }
          # Sanity check: darwin-aarch64 is the primary macOS target — its
          # absence means the macOS matrix entry didn't make it into the
          # merged manifest, and shipping this would silently break the
          # in-app updater for Apple Silicon users.
          if ! grep -q '"darwin-aarch64"' update.json; then
            echo "::error::latest.json has no darwin-aarch64 entry — auto-update would be broken for Apple Silicon"
            cat update.json
            exit 1
          fi
          cp update.json website/public/update/latest.json
          echo "::notice::Published $(jq -r .version update.json) auto-update manifest from release ${{ github.ref_name }}"

      - name: Build website with update manifest
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter gitwand-website build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  # Bump the Homebrew cask in devlint/homebrew-tap to this release's version +
  # universal-DMG sha256, so `brew install --cask devlint/tap/gitwand` always
  # tracks the latest release. Only version + sha256 lines are rewritten, so
  # any manual edits elsewhere in the cask (zap paths, etc.) are preserved.
  #
  # Requires secret HOMEBREW_TAP_TOKEN: a PAT (classic `public_repo`, or
  # fine-grained with Contents: read+write on devlint/homebrew-tap). The default
  # GITHUB_TOKEN can't write to another repo. When the secret is absent the job
  # skips with a warning instead of failing the release.
  bump-homebrew-tap:
    name: Bump Homebrew tap cask
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update devlint/homebrew-tap Casks/gitwand.rb
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP: devlint/homebrew-tap
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping Homebrew tap bump."
            exit 0
          fi
          VERSION="${TAG#v}"
          ASSET="GitWand_${VERSION}_universal.dmg"

          # Fetch the universal DMG's sha256 from the release (retry: the asset
          # digest may not be finalized the instant the matrix job signals done).
          digest=""
          for attempt in 1 2 3 4 5 6; do
            digest=$(GH_TOKEN="$RELEASE_TOKEN" gh api "repos/${REPO}/releases/tags/${TAG}" \
              --jq ".assets[] | select(.name == \"${ASSET}\") | .digest" 2>/dev/null || true)
            [ -n "$digest" ] && break
            echo "::notice::${ASSET} digest not ready (attempt ${attempt}/6) — sleeping 15s"
            sleep 15
          done
          if [ -z "$digest" ]; then
            echo "::error::Could not read ${ASSET} sha256 from release ${TAG}"
            exit 1
          fi
          SHA="${digest#sha256:}"
          echo "::notice::${ASSET} sha256=${SHA}"

          # Pull the current cask, rewrite only version + sha256, commit back.
          blob=$(gh api "repos/${TAP}/contents/Casks/gitwand.rb" --jq .sha)
          gh api "repos/${TAP}/contents/Casks/gitwand.rb" --jq .content | base64 -d > cask.orig
          sed -E "s/^  version \".*\"/  version \"${VERSION}\"/; s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" cask.orig > cask.rb

          if cmp -s cask.orig cask.rb; then
            echo "::notice::Cask already at ${VERSION} with matching sha256 — nothing to bump."
            exit 0
          fi

          gh api -X PUT "repos/${TAP}/contents/Casks/gitwand.rb" \
            -f message="gitwand ${VERSION}" \
            -f sha="$blob" \
            -f content="$(base64 -w0 cask.rb)" \
            --jq '.commit.sha'
          echo "::notice::Bumped ${TAP} cask to ${VERSION}"

  # Submit the new version to microsoft/winget-pkgs so
  # `winget install Devlint.GitWand` always tracks the latest release.
  # wingetcreate fetches the existing manifests, updates version/url/sha256/
  # ProductCode from the actual MSI, and opens the PR from the fork tied to
  # the token.
  #
  # Requires secret WINGET_TOKEN: a PAT (classic `public_repo`, or fine-grained
  # with Contents: read+write on the devlint/winget-pkgs fork) used by
  # wingetcreate to push the manifest branch and open the PR. When the secret
  # is absent the job skips with a warning instead of failing the release.
  publish-winget:
    name: Publish to winget
    needs: release
    runs-on: windows-latest
    steps:
      - name: Submit Devlint.GitWand to microsoft/winget-pkgs
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:WINGET_TOKEN) {
            Write-Host "::warning::WINGET_TOKEN not set — skipping winget submission."
            exit 0
          }
          $version = $env:TAG.TrimStart("v")
          $asset = "GitWand_${version}_x64_en-US.msi"
          $msiUrl = "https://github.com/$env:REPO/releases/download/$env:TAG/$asset"

          # Wait until the MSI asset is actually on the release (the matrix job
          # may signal success before all uploads are finalized).
          $found = $false
          foreach ($attempt in 1..6) {
            $assets = gh api "repos/$env:REPO/releases/tags/$env:TAG" --jq '[.assets[].name]' | ConvertFrom-Json
            if ($assets -contains $asset) { $found = $true; break }
            Write-Host "::notice::$asset not on release yet (attempt $attempt/6) — sleeping 15s"
            Start-Sleep -Seconds 15
          }
          if (-not $found) {
            Write-Host "::error::$asset missing from release $env:TAG — cannot submit to winget"
            exit 1
          }

          # Self-contained wingetcreate (no winget needed on the runner)
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile wingetcreate.exe

          .\wingetcreate.exe update Devlint.GitWand `
            --version $version `
            --urls $msiUrl `
            --submit `
            --token $env:WINGET_TOKEN
          Write-Host "::notice::Submitted Devlint.GitWand $version to microsoft/winget-pkgs"
