name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Build & Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @gitwand/core run build

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: GitWand ${{ github.ref_name }}
          releaseBody: |
            ## GitWand ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon + Intel) | `.dmg` |
            | Linux | `.deb` · `.AppImage` |
            | Windows | `.msi` · `.exe` |

            See the [changelog](https://github.com/devlint/GitWand/commits/${{ github.ref_name }}) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: true

  # After all platform builds succeed, generate update.json and publish to GitHub Pages
  publish-update-manifest:
    name: Publish update manifest
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate update.json for Tauri updater
        run: |
          VERSION="${{ github.ref_name }}"
          BASE="https://github.com/devlint/GitWand/releases/download/${VERSION}"
          cat > update.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See https://github.com/devlint/GitWand/releases/tag/${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": { "url": "${BASE}/GitWand_${VERSION#v}_universal.dmg.tar.gz", "signature": "" },
              "linux-x86_64":     { "url": "${BASE}/git-wand_${VERSION#v}_amd64.AppImage.tar.gz", "signature": "" },
              "windows-x86_64":   { "url": "${BASE}/GitWand_${VERSION#v}_x64-setup.nsis.zip",    "signature": "" }
            }
          }
          EOF
          mkdir -p website/public/update
          cp update.json website/public/update/latest.json

      - name: Build website with update manifest
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter gitwand-website build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
